const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2bnl6eHVzZmlsb2FpdnZobG5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjAzMjcsImV4cCI6MjA5MzIzNjMyN30.uT4KjSUxK9rwINGRktVcUgu3vdwvuoQ3lEFfccfJTQY";

async function db(path,o={}){
  const sep=path.includes("?")?"&":"?";
  const url=SUPA_URL+"/rest/v1"+path+sep+"apikey="+KEY;
  const method=o.method||"GET";
  const headers=new Headers();
  headers.set("apikey",KEY);
  headers.set("Authorization","Bearer "+KEY);
  headers.set("Content-Type","application/json");
  headers.set("Accept","application/json");
  if(o.headers)Object.entries(o.headers).forEach(([k,v])=>headers.set(k,v));
  const res=await fetch(url,{method,headers,body:o.body});
  if(!res.ok&&res.status!==404)throw new Error(await res.text());
  if(res.status===204)return null;
  return res.json();
}

// ── STATUS BADGE ──────────────────────────────────────────────────────────────
const STATUS_COLORS={
  aangemaakt:{bg:"#1a2332",color:"#58a6ff"},
  toegewezen:{bg:"#1a2332",color:"#58a6ff"},
  geaccepteerd:{bg:"#1a2332",color:"#58a6ff"},
  naar_ophaling:{bg:"#2d2000",color:"#e3b341"},
  opgehaald:{bg:"#2d2000",color:"#e3b341"},
  onderweg:{bg:"#2d2000",color:"#e3b341"},
  aangekomen:{bg:"#2d2000",color:"#e3b341"},
  afgeleverd:{bg:"#112d24",color:"#3fb950"},
  voltooid:{bg:"#112d24",color:"#3fb950"},
  mislukt:{bg:"#2a0408",color:"#f85149"},
  retour:{bg:"#2a0408",color:"#f85149"},
};
const STATUS_NL={
  aangemaakt:"Aangemaakt",toegewezen:"Toegewezen",geaccepteerd:"Geaccepteerd",
  naar_ophaling:"Naar ophaling",opgehaald:"Opgehaald",onderweg:"Onderweg",
  aangekomen:"Aangekomen",afgeleverd:"Afgeleverd",voltooid:"Voltooid",
  mislukt:"Mislukt",retour:"Retour"
};

function Badge({status}){
  const s=STATUS_COLORS[status]||{bg:"#21262D",color:"#8B949E"};
  return <span style={{background:s.bg,color:s.color,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700}}>
    {STATUS_NL[status]||status}
  </span>;
}

// ── CUTOFF MELDING ────────────────────────────────────────────────────────────
function CutoffMelding(){
  const nu=new Date();
  const uur=nu.getHours();
  const minuten=nu.getMinutes();
  if(uur<15)return null;
  return <div style={{background:"#fff3cd",border:"2px solid #f0ad4e",borderRadius:4,padding:"14px 20px",marginBottom:20,display:"flex",alignItems:"center",gap:12}}>
    <span style={{fontSize:24}}>⚠️</span>
    <div>
      <div style={{fontWeight:700,fontSize:15,color:"#856404"}}>ORDERS NA 15:00 WORDEN DE VOLGENDE WERKDAG BEHANDELD</div>
      <div style={{fontSize:12,color:"#856404",marginTop:2}}>Het is nu {uur}:{String(minuten).padStart(2,"0")} — uw bestelling wordt morgen verwerkt.</div>
    </div>
  </div>;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [bedrijf,setBedrijf]=React.useState("");
  const [pincode,setPincode]=React.useState("");
  const [loading,setLoading]=React.useState(false);
  const [err,setErr]=React.useState("");

  async function login(){
    if(!bedrijf||!pincode){setErr("Vul alle velden in");return;}
    setLoading(true);setErr("");
    try{
      const r=await db(`/klanten?bedrijfsnaam=ilike.${encodeURIComponent(bedrijf)}&pincode=eq.${pincode}&actief=eq.true&select=*`);
      if(r&&r.length>0){
        onLogin(r[0]);
      } else {
        setErr("Bedrijfsnaam of pincode onjuist");
      }
    }catch(e){setErr("Inloggen mislukt: "+e.message);}
    setLoading(false);
  }

  return <div style={{minHeight:"100vh",background:"#f5f5f5",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{width:"100%",maxWidth:420}}>
      {/* Logo */}
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontFamily:"Impact,sans-serif",fontSize:40,lineHeight:1,display:"inline-flex"}}>
          <span style={{background:"#1a1a1a",color:"#fff",padding:"6px 14px",border:"1px solid #333",letterSpacing:1}}>SO</span>
          <span style={{background:"#8B1020",color:"#fff",padding:"6px 14px",border:"2px solid #6a0d18",letterSpacing:3}}>LOGICS</span>
        </div>
        <div style={{fontSize:11,color:"#888",letterSpacing:2,marginTop:6,textTransform:"lowercase"}}>simplify your logistics business</div>
        <div style={{fontSize:14,color:"#555",marginTop:12,fontWeight:500}}>Klantenportaal</div>
      </div>

      <div style={{background:"#fff",borderRadius:8,padding:28,boxShadow:"0 2px 16px rgba(0,0,0,.08)"}}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:20,color:"#111"}}>Inloggen</div>

        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,fontWeight:600,color:"#555",textTransform:"uppercase",letterSpacing:"0.06em",display:"block",marginBottom:6}}>Bedrijfsnaam</label>
          <input style={{width:"100%",border:"1px solid #ddd",borderRadius:4,padding:"11px 14px",fontSize:14,outline:"none",background:"#fafafa"}}
            value={bedrijf} onChange={e=>setBedrijf(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&login()}
            placeholder="Uw bedrijfsnaam"/>
        </div>

        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,fontWeight:600,color:"#555",textTransform:"uppercase",letterSpacing:"0.06em",display:"block",marginBottom:6}}>Pincode</label>
          <input style={{width:"100%",border:"1px solid #ddd",borderRadius:4,padding:"11px 14px",fontSize:14,outline:"none",background:"#fafafa"}}
            type="password" value={pincode} onChange={e=>setPincode(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&login()}
            placeholder="••••"/>
        </div>

        {err&&<div style={{background:"#fff3f3",border:"1px solid #f5c6c6",borderRadius:4,padding:"10px 14px",color:"#c0392b",fontSize:13,marginBottom:16}}>{err}</div>}

        <button onClick={login} disabled={loading} style={{width:"100%",background:"#8B1020",color:"#fff",border:"none",borderRadius:4,padding:"14px",fontSize:15,fontWeight:700,opacity:loading?0.7:1}}>
          {loading?"Inloggen...":"Inloggen →"}
        </button>

        <div style={{marginTop:16,textAlign:"center",fontSize:12,color:"#888"}}>
          Geen toegang? Neem contact op via <a href="https://wa.me/5977140097" style={{color:"#8B1020"}}>WhatsApp</a>
        </div>
      </div>
    </div>
  </div>;
}

// ── PORTAAL ───────────────────────────────────────────────────────────────────

  const [zendingen,setZendingen]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [detail,setDetail]=React.useState(null);

  React.useEffect(()=>{load();},[]);

  async function load(){
    setLoading(true);
    try{
      const r=await db(`/zendingen?klant_id=eq.${klant.id}&order=aangemaakt_op.desc&select=*`);
      setZendingen(r||[]);

    setLoading(false);

      headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"},
      body:JSON.stringify(z)

    setTimeout(()=>win.print(),500);

      <div style={{fontFamily:"Impact,sans-serif",fontSize:24,lineHeight:1,display:"flex"}}>
        <span style={{background:"#1a1a1a",color:"#fff",padding:"3px 8px",letterSpacing:1}}>SO</span>
        <span style={{background:"#8B1020",color:"#fff",padding:"3px 8px",letterSpacing:2}}>LOGICS</span>

                  <td style={{padding:"12px 14px"}}>{z.ontvanger_naam||"—"}</td>
                  <td style={{padding:"12px 14px",color:"#555",whiteSpace:"nowrap"}}>{fmt(z.aangemaakt_op)}</td>

                  </td>
                </tr>)}
              </tbody>
            </table>
          </div>
        }
      </div>}

      {/* BETAALSTATUS TAB */}
      {!loading&&tab==="betaalstatus"&&<div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          <div style={{background:"#fff",borderRadius:6,padding:"16px 20px",boxShadow:"0 1px 4px rgba(0,0,0,.06)",borderLeft:"4px solid #8B1020"}}>
            <div style={{fontSize:11,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Totaal gefactureerd</div>

                <tr>
                  {["Zending #","Ontvanger","Bedrag","Betaler","Methode","Status"].map(h=>

                  <td style={{padding:"12px 14px",fontWeight:600,color:"#8B1020"}}>{z.zending_code}</td>
                  <td style={{padding:"12px 14px"}}>{z.ontvanger_naam||"—"}</td>
                  <td style={{padding:"12px 14px",fontWeight:600}}>{z.prijs_srd?`SRD ${z.prijs_srd}`:"—"}</td>

    {/* DETAIL MODAL */}
    {detail&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:8,width:"100%",maxWidth:480,maxHeight:"80vh",overflow:"auto"}}>
        <div style={{padding:"14px 20px",borderBottom:"1px solid #eee",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"#fff"}}>
          <div style={{fontWeight:700,fontSize:16}}>{detail.zending_code}</div>
          <button onClick={()=>setDetail(null)} style={{background:"#f5f5f5",border:"none",borderRadius:4,width:30,height:30,fontSize:18,color:"#555"}}>✕</button>
        </div>
        <div style={{padding:20}}>
          <Badge status={detail.status}/>
          <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:10}}>
            {[
              ["Ontvanger",detail.ontvanger_naam],
              ["Telefoon",detail.ontvanger_tel],
              ["Afleveradres",detail.afleveradres],
              ["District",detail.district],
              ["Afstand",detail.afstand_km?detail.afstand_km+" km":"—"],
              ["Prijs",detail.prijs_srd?"SRD "+detail.prijs_srd:"—"],
              ["Betaler",detail.betaler||"afzender"],
              ["Betaalmethode",detail.betaalmethode||"—"],
              ["COD bedrag",detail.cod_bedrag>0?"SRD "+detail.cod_bedrag:"—"],
              ["Aangemaakt",fmt(detail.aangemaakt_op)],

              <span style={{color:"#888",fontWeight:500}}>{l}</span>
              <span style={{color:"#111",fontWeight:600,textAlign:"right",maxWidth:"60%"}}>{v||"—"}</span>
            </div>)}
          </div>
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <a href={`https://sologics.site/tracking.html?code=${detail.zending_code}`} target="_blank" style={{flex:1,background:"#f5f5f5",border:"1px solid #ddd",borderRadius:4,padding:"10px",textAlign:"center",fontSize:13,color:"#555",textDecoration:"none",fontWeight:600}}>
              📍 Volgen
            </a>
            <button onClick={()=>downloadInvoice(detail)} style={{flex:1,background:"#8B1020",color:"#fff",border:"none",borderRadius:4,padding:"10px",fontSize:13,fontWeight:600}}>
              📄 Invoice
            </button>
          </div>
        </div>
      </div>
    </div>}
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [klant,setKlant]=React.useState(null);

  // Check URL voor zending code (tracking redirect)
  React.useEffect(()=>{
    const stored=sessionStorage.getItem("sl_klant");
    if(stored)setKlant(JSON.parse(stored));
  },[]);

  function handleLogin(k){
    setKlant(k);
    sessionStorage.setItem("sl_klant",JSON.stringify(k));
  }

  function handleLogout(){
    setKlant(null);
    sessionStorage.removeItem("sl_klant");
  }

  if(!klant)return <Login onLogin={handleLogin}/>;
  return <Portaal klant={klant} onLogout={handleLogout}/>;
}
