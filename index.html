const MAPS_KEY="AIzaSyAAljdqj-5DtidkaQG2pDgBnpHHGSB-QKU";
const START_ADRES="Marowijnestraat 84a, Paramaribo, Suriname";
const START_BEDRAG=55;
const PRIJS_PER_KM=10;

async function berekenPrijs(afleveradres){
  try{
    const origin=encodeURIComponent(START_ADRES);
    const dest=encodeURIComponent(afleveradres+", Suriname");
    const url=`https://maps.googleapis.com/maps/api/distancematrix/json?origins=${origin}&destinations=${dest}&key=${MAPS_KEY}&units=metric`;
    const r=await fetch(url);
    const d=await r.json();
    if(d.rows&&d.rows[0]&&d.rows[0].elements&&d.rows[0].elements[0].status==="OK"){
      const km=d.rows[0].elements[0].distance.value/1000;
      const prijs=START_BEDRAG+(km*PRIJS_PER_KM);
      return {km:Math.round(km*10)/10,prijs:Math.round(prijs)};
    }
    return null;
  }catch(e){
    return null;
  }
}
async function db(path,o={}){
  const sep=path.includes("?") ? "&" : "?";
  const url=SUPA_URL+"/rest/v1"+path+sep+"apikey="+KEY;
  const method=o.method||"GET";
  const reqHeaders=new Headers();
  reqHeaders.set("apikey",KEY);
  reqHeaders.set("Authorization","Bearer "+KEY);
  reqHeaders.set("Accept","application/json");
  if(method!=="GET"&&method!=="DELETE"){
    reqHeaders.set("Content-Type","application/json");
  }
  if(o.headers){
    Object.entries(o.headers).forEach(([k,v])=>reqHeaders.set(k,v));
  }
  const r=await fetch(url,{...o,method,headers:reqHeaders});
  if(!r.ok)throw new Error(await r.text());
  if(r.status===204||r.status===201)return null;
  const text=await r.text();
  if(!text||text.trim()==="")return null;
  return JSON.parse(text);
}

// ── ZENDINGEN ────────────────────────────────────────────────────────────────
function Zendingen({zendingen,chauffeurs,klanten,onRefresh}){
  const [filter,setFilter]=React.useState("alle");
  const [search,setSearch]=React.useState("");
  const [showNew,setShowNew]=React.useState(false);
  const [detail,setDetail]=React.useState(null);
  const [saving,setSaving]=React.useState(false);
  const [err,setErr]=React.useState("");
  const [form,setForm]=React.useState({
    klant_id:"",ontvanger_naam:"",ontvanger_tel:"",ontvanger_email:"",
    ophaaladres:"",afleveradres:"",district:"Paramaribo",
    pakkettype:"",gewicht_kg:"",diensttype:"standaard",
    cod_bedrag:"",chauffeur_id:"",notities:"",
    betaler:"afzender",betaalmethode:"pos"
  });
  const [prijsInfo,setPrijsInfo]=React.useState(null);
  const [berekenend,setBerekenend]=React.useState(false);

  async function updateAfleveradres(adres){
    setForm(f=>({...f,afleveradres:adres}));
    if(adres.length>5){
      setBerekenend(true);
      const p=await berekenPrijs(adres);
      setPrijsInfo(p);
      if(p)setForm(f=>({...f,afleveradres:adres,prijs_srd:p.prijs,afstand_km:p.km}));
      setBerekenend(false);
    }
  }

  const filtered=zendingen.filter(z=>{
    const mf=filter==="alle"||z.status===filter;
    const ms=!search||z.zending_code?.toLowerCase().includes(search.toLowerCase())||z.ontvanger_naam?.toLowerCase().includes(search.toLowerCase())||z.afleveradres?.toLowerCase().includes(search.toLowerCase())||z.district?.toLowerCase().includes(search.toLowerCase());
    return mf&&ms;
  });

  async function save(){
    if(!form.afleveradres){setErr("Afleveradres is verplicht");return;}
    setSaving(true);setErr("");
    try{
      try{
        await db("/zendingen",{method:"POST",headers:{Prefer:"return=representation"},body:JSON.stringify({
          ...form,
          gewicht_kg:form.gewicht_kg||null,
          cod_bedrag:parseFloat(form.cod_bedrag)||0,
          klant_id:form.klant_id||null,
          chauffeur_id:form.chauffeur_id||null,
          prijs_srd:prijsInfo?prijsInfo.prijs:null,
          afstand_km:prijsInfo?prijsInfo.km:null,
          zending_code:""
        })});
      }catch(e){
        // 201/empty response is fine - zending was created
        if(!e.message.includes("Unexpected end of JSON")&&!e.message.includes("201")){
          setErr(e.message);setSaving(false);return;
        }
      }
      setShowNew(false);
      setForm({klant_id:"",ontvanger_naam:"",ontvanger_tel:"",ontvanger_email:"",ophaaladres:"",afleveradres:"",district:"Paramaribo",pakkettype:"",gewicht_kg:"",diensttype:"standaard",cod_bedrag:"",chauffeur_id:"",notities:"",betaler:"afzender",betaalmethode:"pos"});setPrijsInfo(null);
      onRefresh();
    }catch(e){setErr(e.message);}
    setSaving(false);
  }

  async function updateStatus(id,status){
    await db(`/zendingen?id=eq.${id}`,{method:"PATCH",headers:{Prefer:"return=representation"},body:JSON.stringify({status})});
    // log it
    await db("/status_logs",{method:"POST",headers:{Prefer:"return=representation"},body:JSON.stringify({zending_id:id,status})});
    onRefresh();
    if(detail?.id===id)setDetail(d=>({...d,status}));
  }

  async function assignDriver(id,chauffeur_id){
    await db(`/zendingen?id=eq.${id}`,{method:"PATCH",headers:{Prefer:"return=representation"},body:JSON.stringify({chauffeur_id,status:"toegewezen"})});
    await db("/status_logs",{method:"POST",headers:{Prefer:"return=representation"},body:JSON.stringify({zending_id:id,status:"toegewezen"})});
    onRefresh();
    if(detail?.id===id)setDetail(d=>({...d,chauffeur_id,status:"toegewezen"}));
  }

  async function del(id){
    if(!confirm("Zending verwijderen?"))return;
    await db(`/zendingen?id=eq.${id}`,{method:"DELETE"});
    onRefresh();setDetail(null);
  }

  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div className="page-head" style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:1}}>Zendingen</div>
      <button style={S.btn} onClick={()=>setShowNew(true)}>+ Nieuwe zending</button>
    </div>

    <input style={S.inp} placeholder="Zoek op code, ontvanger, adres, district..." value={search} onChange={e=>setSearch(e.target.value)}/>

    <div style={{display:"flex",gap:3,background:"#0D1117",padding:3,borderRadius:2,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
      {["alle",...Object.keys(ZSTATUS)].map(s=><button key={s} onClick={()=>setFilter(s)} style={{padding:"5px 9px",borderRadius:2,fontSize:10,cursor:"pointer",border:"none",fontFamily:"'DM Sans',sans-serif",background:filter===s?"#161B22":"transparent",color:filter===s?"#f01e2c":"#8B949E",fontWeight:filter===s?700:400,whiteSpace:"nowrap",flexShrink:0}}>
        {s==="alle"?"Alle":ZSTATUS[s].s}
      </button>)}
    </div>

    <div style={S.tw}>
      <table style={{width:"100%",borderCollapse:"collapse",minWidth:360}}>
        <thead style={{background:"#0D1117"}}>
          <tr>
            <th style={S.th}>Code</th>
            <th style={S.th}>Ontvanger</th>
            <th style={S.th} className="hide-mob">District</th>
            <th style={S.th} className="hide-mob">Chauffeur</th>
            <th style={S.th} className="hide-mob">COD</th>
            <th style={S.th} className="hide-mob">Prijs</th>
            <th style={S.th}>Status</th>
            <th style={S.th}></th>
          </tr>
        </thead>
        <tbody>
          {filtered.length===0&&<tr><td colSpan={7} style={{...S.td,textAlign:"center",color:"#8B949E",padding:28}}>Geen zendingen gevonden</td></tr>}
          {filtered.map(z=>{
            const ch=chauffeurs.find(c=>c.id===z.chauffeur_id);
            return <tr key={z.id} style={{cursor:"pointer"}} onClick={()=>setDetail(z)}>
              <td style={{...S.td,color:"#f01e2c",fontFamily:"'Bebas Neue',sans-serif",fontSize:14,whiteSpace:"nowrap"}}>{z.zending_code}</td>
              <td style={{...S.td,maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{z.ontvanger_naam||"—"}</td>
              <td style={{...S.td,color:"#8B949E"}} className="hide-mob">{z.district||"—"}</td>
              <td style={{...S.td,color:"#8B949E"}} className="hide-mob">{ch?.naam||<span style={{color:"#f01e2c",fontSize:11}}>⚠ Geen</span>}</td>
              <td style={S.td} className="hide-mob">{z.cod_bedrag>0?<span style={{color:"#D29922",fontWeight:600}}>SRD {z.cod_bedrag}</span>:"—"}</td>
              <td style={S.td} className="hide-mob">{z.prijs_srd?<span style={{color:"#3FB950",fontWeight:600}}>SRD {z.prijs_srd}</span>:"—"}</td>
              <td style={S.td}><Bdg status={z.status} short/></td>

// ── CHAUFFEURS ────────────────────────────────────────────────────────────────
function Chauffeurs({chauffeurs,zendingen,onRefresh}){
  const [showNew,setShowNew]=React.useState(false);
  const [form,setForm]=React.useState({naam:"",telefoon:"",email:"",kenteken:"",voertuig:"",pincode:"1234",actief:true});
  const [saving,setSaving]=React.useState(false);
  const [err,setErr]=React.useState("");

  async function save(){
    if(!form.naam){setErr("Naam is verplicht");return;}
    setSaving(true);setErr("");
    try{
      await db("/chauffeurs",{method:"POST",headers:{Prefer:"return=representation"},body:JSON.stringify(form)});
      setShowNew(false);setForm({naam:"",telefoon:"",email:"",kenteken:"",voertuig:"",pincode:"1234",actief:true});onRefresh();
    }catch(e){setErr(e.message);}
    setSaving(false);
  }

  async function toggle(id,actief){
    await db(`/chauffeurs?id=eq.${id}`,{method:"PATCH",headers:{Prefer:"return=representation"},body:JSON.stringify({actief})});
    onRefresh();
  }

  async function del(id){
    if(!confirm("Chauffeur verwijderen?"))return;
    await db(`/chauffeurs?id=eq.${id}`,{method:"DELETE"});onRefresh();
  }

  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div className="page-head" style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:1}}>Chauffeurs</div>
      <button style={S.btn} onClick={()=>setShowNew(true)}>+ Nieuwe chauffeur</button>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {chauffeurs.length===0&&<div style={{...S.card,color:"#8B949E",textAlign:"center",padding:28,fontSize:13}}>Nog geen chauffeurs toegevoegd</div>}
      {chauffeurs.map(c=>{
        const actief_z=zendingen.filter(z=>z.chauffeur_id===c.id&&["onderweg","naar_ophaling","opgehaald","geaccepteerd"].includes(z.status)).length;
        const totaal_z=zendingen.filter(z=>z.chauffeur_id===c.id).length;
        return <div key={c.id} style={{...S.card,display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:44,height:44,borderRadius:2,background:c.actief?"#112D24":"#21262D",color:c.actief?"#3FB950":"#484F58",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,flexShrink:0}}>
            {c.naam.slice(0,2).toUpperCase()}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontWeight:600,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.naam}</div>
              <span style={{fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:2,background:c.actief?"#112D24":"#21262D",color:c.actief?"#3FB950":"#484F58"}}>{c.actief?"ACTIEF":"INACTIEF"}</span>
            </div>
            <div style={{fontSize:12,color:"#8B949E",marginTop:2}}>{[c.voertuig,c.kenteken].filter(Boolean).join(" · ")||"Geen voertuig"}</div>
            <div style={{fontSize:11,color:"#484F58",marginTop:1}}>{c.telefoon||""} {c.email?`· ${c.email}`:""}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
            <div style={{display:"flex",gap:6}}>
              <span style={{background:"#1A3A5C",color:"#58A6FF",padding:"2px 8px",borderRadius:2,fontSize:11,fontWeight:600}}>{actief_z} actief</span>
              <span style={{background:"#21262D",color:"#8B949E",padding:"2px 8px",borderRadius:2,fontSize:11,fontWeight:600}}>{totaal_z} totaal</span>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button style={{...S.btnGhost,padding:"4px 8px",fontSize:11,color:c.actief?"#f01e2c":"#3FB950",borderColor:c.actief?"#f01e2c":"#3FB950"}} onClick={()=>toggle(c.id,!c.actief)}>
                {c.actief?"Deactiveer":"Activeer"}
              </button>
              <button style={{...S.btnGhost,padding:"4px 8px",fontSize:11}} onClick={()=>del(c.id)}>✕</button>
            </div>
          </div>
        </div>
      })}
    </div>

    {showNew&&<Modal title="Nieuwe chauffeur" onClose={()=>setShowNew(false)}>
      <Fld l="Naam *" ch={<input style={S.inp} value={form.naam} onChange={e=>setForm(f=>({...f,naam:e.target.value}))}/>}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Fld l="Telefoon" ch={<input style={S.inp} value={form.telefoon} onChange={e=>setForm(f=>({...f,telefoon:e.target.value}))}/>}/>
        <Fld l="Email" ch={<input style={S.inp} type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/>}/>
        <Fld l="Voertuig" ch={<input style={S.inp} value={form.voertuig} onChange={e=>setForm(f=>({...f,voertuig:e.target.value}))} placeholder="Auto, motor, bestelwagen..."/>}/>
        <Fld l="Kenteken" ch={<input style={S.inp} value={form.kenteken} onChange={e=>setForm(f=>({...f,kenteken:e.target.value}))}/>}/>
        <Fld l="Pincode" ch={<input style={S.inp} type="number" maxLength={6} value={form.pincode} onChange={e=>setForm(f=>({...f,pincode:e.target.value}))} placeholder="bijv. 1234"/>}/>
      </div>
      {err&&<div style={{color:"#f01e2c",fontSize:12,marginBottom:10}}>{err}</div>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button style={S.btnGhost} onClick={()=>setShowNew(false)}>Annuleren</button>
        <button style={S.btn} onClick={save} disabled={saving}>{saving?"Opslaan...":"Aanmaken"}</button>
      </div>
    </Modal>}
  </div>
}

function Klanten({klanten,zendingen,onRefresh}){

  const filtered=klanten.filter(k=>!search||k.bedrijfsnaam.toLowerCase().includes(search.toLowerCase())||k.stad?.toLowerCase().includes(search.toLowerCase()));

    if(!form.bedrijfsnaam){setErr("Bedrijfsnaam is verplicht");return;}

      await db("/klanten",{method:"POST",headers:{Prefer:"return=representation"},body:JSON.stringify(form)});

// ── DISPATCH ──────────────────────────────────────────────────────────────────
function Dispatch({zendingen,chauffeurs,onRefresh}){
  const open=zendingen.filter(z=>!z.chauffeur_id&&!["afgeleverd","voltooid","mislukt","geannuleerd"].includes(z.status));
  const [sel,setSel]=React.useState({});

  async function assign(zid){
    const cid=sel[zid];
    if(!cid){alert("Selecteer een chauffeur");return;}
    await db(`/zendingen?id=eq.${zid}`,{method:"PATCH",headers:{Prefer:"return=representation"},body:JSON.stringify({chauffeur_id:cid,status:"toegewezen"})});
    await db("/status_logs",{method:"POST",headers:{Prefer:"return=representation"},body:JSON.stringify({zending_id:zid,status:"toegewezen"})});
    onRefresh();
  }

  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:1}}>Dispatch</div>
      <div style={{fontSize:12,color:"#8B949E",marginTop:2}}>Wijs chauffeurs toe aan openstaande zendingen</div>
    </div>

    {open.length===0&&<div style={{...S.card,textAlign:"center",color:"#3FB950",padding:32,fontSize:14}}>✓ Alle zendingen zijn toegewezen</div>}

    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {open.map(z=>{
        const k=z.ontvanger_naam||"Onbekend";
        return <div key={z.id} style={{...S.card,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{color:"#f01e2c",fontFamily:"'Bebas Neue',sans-serif",fontSize:15}}>{z.zending_code}</span>
              <Bdg status={z.status}/>
              {z.cod_bedrag>0&&<span style={{background:"#2D1D00",color:"#D29922",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:2}}>COD SRD {z.cod_bedrag}</span>}
            </div>
            <div style={{fontSize:13,color:"#E6EDF3",marginTop:4}}>{k} — {z.afleveradres}</div>
            <div style={{fontSize:11,color:"#8B949E",marginTop:2}}>{z.district} · {z.diensttype}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
            <select style={{...S.sel,width:180}} value={sel[z.id]||""} onChange={e=>setSel(s=>({...s,[z.id]:e.target.value}))}>
              <option value="">Chauffeur...</option>
              {chauffeurs.filter(c=>c.actief).map(c=><option key={c.id} value={c.id}>{c.naam}</option>)}
            </select>
            <button style={S.btn} onClick={()=>assign(z.id)}>Toewijzen</button>
          </div>
        </div>
      })}
    </div>

    <div>
      <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Actieve ritten per chauffeur</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {chauffeurs.filter(c=>c.actief).map(c=>{
          const ritten=zendingen.filter(z=>z.chauffeur_id===c.id&&["toegewezen","geaccepteerd","naar_ophaling","opgehaald","onderweg","aangekomen"].includes(z.status));
          return <div key={c.id} style={S.card}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:ritten.length>0?10:0}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#3FB950"}}/>
              <div style={{fontWeight:600,fontSize:13}}>{c.naam}</div>
              <span style={{fontSize:11,color:"#8B949E"}}>{c.voertuig||""}</span>
              <span style={{marginLeft:"auto",background:"#1A3A5C",color:"#58A6FF",fontSize:11,fontWeight:600,padding:"2px 7px",borderRadius:2}}>{ritten.length} rit{ritten.length!==1?"ten":""}</span>
            </div>
            {ritten.map(z=><div key={z.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderTop:"1px solid #21262D",fontSize:12}}>
              <span style={{color:"#f01e2c",fontFamily:"'Bebas Neue',sans-serif",fontSize:13}}>{z.zending_code}</span>
              <span style={{color:"#C9D1D9",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{z.afleveradres}</span>
              <Bdg status={z.status} short/>
            </div>)}
          </div>
        })}
      </div>
    </div>
  </div>
}


// ── ADMIN LOGIN ───────────────────────────────────────────────────────────────
const ADMIN_USER = "admin";
const ADMIN_PASS = "Sologics2026";

function AdminLogin({onLogin}){
  const [user,setUser]=React.useState("");
  const [pass,setPass]=React.useState("");
  const [err,setErr]=React.useState("");
  const [show,setShow]=React.useState(false);

  function login(){
    if(user===ADMIN_USER&&pass===ADMIN_PASS){
      sessionStorage.setItem("sl_admin","1");
      onLogin();
    } else {
      setErr("Onjuiste gebruikersnaam of wachtwoord");
    }
  }

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,background:"#0D1117"}}>
    <div style={{display:"flex",alignItems:"center",fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:1,lineHeight:1,marginBottom:6}}>
      <span style={{color:"#E6EDF3",background:"#222",padding:"3px 10px"}}>SO</span>
      <span style={{color:"#fff",background:"#f01e2c",padding:"3px 12px"}}>LOGICS</span>
    </div>
    <div style={{fontSize:12,color:"#8B949E",marginBottom:40,letterSpacing:"0.1em",textTransform:"uppercase"}}>Admin Dashboard</div>

    <div style={{width:"100%",maxWidth:360,background:"#161B22",border:"1px solid #21262D",borderRadius:4,padding:24}}>
      <div style={{marginBottom:16}}>
        <label style={{fontSize:11,color:"#8B949E",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6,display:"block"}}>Gebruikersnaam</label>
        <input style={{width:"100%",background:"#0D1117",border:"1px solid #30363D",borderRadius:2,color:"#E6EDF3",padding:"11px 12px",fontSize:14,outline:"none",fontFamily:"'DM Sans',sans-serif"}}
          value={user} onChange={e=>setUser(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="admin"/>
      </div>
      <div style={{marginBottom:20}}>
        <label style={{fontSize:11,color:"#8B949E",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6,display:"block"}}>Wachtwoord</label>
        <div style={{position:"relative"}}>
          <input style={{width:"100%",background:"#0D1117",border:"1px solid #30363D",borderRadius:2,color:"#E6EDF3",padding:"11px 40px 11px 12px",fontSize:14,outline:"none",fontFamily:"'DM Sans',sans-serif"}}
            type={show?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="••••••••"/>
          <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#8B949E",cursor:"pointer",fontSize:16}}>
            {show?"🙈":"👁"}
          </button>
        </div>
      </div>
      {err&&<div style={{background:"#2a0408",border:"1px solid #f01e2c",borderRadius:2,padding:"8px 12px",color:"#f01e2c",fontSize:12,marginBottom:14}}>{err}</div>}
      <button onClick={login} style={{width:"100%",background:"#f01e2c",color:"#fff",border:"none",borderRadius:2,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
        Inloggen →
      </button>
    </div>
    <div style={{marginTop:16,fontSize:11,color:"#484F58"}}>SOlogics Suriname © 2026</div>
  </div>
}


// ── RAPPORTAGES ───────────────────────────────────────────────────────────────
function Rapportages({zendingen,chauffeurs}){
  const [periode,setPeriode]=React.useState("vandaag");

  const nu=new Date();
  const filtered=zendingen.filter(z=>{
    const d=new Date(z.aangemaakt_op);
    if(periode==="vandaag") return d.toDateString()===nu.toDateString();
    if(periode==="week"){
      const week=new Date(nu);week.setDate(nu.getDate()-7);
      return d>=week;
    }
    if(periode==="maand"){
      return d.getMonth()===nu.getMonth()&&d.getFullYear()===nu.getFullYear();
    }
    return true;
  });

  const afgeleverd=filtered.filter(z=>z.status==="afgeleverd"||z.status==="voltooid");
  const mislukt=filtered.filter(z=>z.status==="mislukt");
  const onderweg=filtered.filter(z=>z.status==="onderweg");
  const succes=filtered.length>0?Math.round((afgeleverd.length/filtered.length)*100):0;
  const cod_totaal=filtered.filter(z=>z.cod_bedrag>0).reduce((a,z)=>a+parseFloat(z.cod_bedrag||0),0);
  const cod_ontvangen=filtered.filter(z=>z.cod_ontvangen).reduce((a,z)=>a+parseFloat(z.cod_bedrag||0),0);
  const cod_open=cod_totaal-cod_ontvangen;

  // Per chauffeur stats
  const chStats=chauffeurs.map(c=>{
    const cz=filtered.filter(z=>z.chauffeur_id===c.id);
    const ca=cz.filter(z=>z.status==="afgeleverd"||z.status==="voltooid");
    const cm=cz.filter(z=>z.status==="mislukt");
    const ccod=cz.filter(z=>z.cod_ontvangen).reduce((a,z)=>a+parseFloat(z.cod_bedrag||0),0);
    return {...c,totaal:cz.length,afgeleverd:ca.length,mislukt:cm.length,cod:ccod,succes:cz.length>0?Math.round((ca.length/cz.length)*100):0};
  }).filter(c=>c.totaal>0).sort((a,b)=>b.totaal-a.totaal);

  // Per district
  const districts=[...new Set(filtered.map(z=>z.district).filter(Boolean))];
  const distStats=districts.map(d=>{
    const dz=filtered.filter(z=>z.district===d);
    return {district:d,totaal:dz.length,afgeleverd:dz.filter(z=>["afgeleverd","voltooid"].includes(z.status)).length};
  }).sort((a,b)=>b.totaal-a.totaal);

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:1}}>Rapportages</div>
      <div style={{display:"flex",gap:3,background:"#0D1117",padding:3,borderRadius:2}}>
        {[{id:"vandaag",l:"Vandaag"},{id:"week",l:"Week"},{id:"maand",l:"Maand"},{id:"alles",l:"Alles"}].map(p=>
          <button key={p.id} onClick={()=>setPeriode(p.id)} style={{padding:"6px 12px",borderRadius:2,fontSize:12,cursor:"pointer",border:"none",fontFamily:"'DM Sans',sans-serif",background:periode===p.id?"#161B22":"transparent",color:periode===p.id?"#f01e2c":"#8B949E",fontWeight:periode===p.id?700:400}}>
            {p.l}
          </button>
        )}
      </div>
    </div>

    {/* KPI stats */}
    <div className="stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
      {[
        {l:"Totaal zendingen",v:filtered.length,c:"#E6EDF3"},
        {l:"Afgeleverd",v:afgeleverd.length,c:"#3FB950"},
        {l:"Mislukt",v:mislukt.length,c:mislukt.length>0?"#f01e2c":"#8B949E"},
        {l:"Succespercentage",v:`${succes}%`,c:succes>=80?"#3FB950":succes>=60?"#D29922":"#f01e2c"},
      ].map(s=><div key={s.l} style={{background:"#161B22",border:"1px solid #21262D",borderTop:"2px solid #f01e2c",borderRadius:2,padding:"12px 10px"}}>
        <div style={{fontSize:10,color:"#8B949E",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",lineHeight:1.3}}>{s.l}</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:34,color:s.c,lineHeight:1,marginTop:4}}>{s.v}</div>
      </div>)}
    </div>

    {/* COD overzicht */}
    <div style={{background:"#161B22",border:"1px solid #21262D",borderRadius:2,padding:16}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>💰 COD Rembours Overzicht</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {[
          {l:"Totaal COD",v:`SRD ${cod_totaal.toFixed(2)}`,c:"#E6EDF3"},
          {l:"Ontvangen",v:`SRD ${cod_ontvangen.toFixed(2)}`,c:"#3FB950"},
          {l:"Nog open",v:`SRD ${cod_open.toFixed(2)}`,c:cod_open>0?"#D29922":"#3FB950"},
        ].map(s=><div key={s.l} style={{background:"#0D1117",borderRadius:2,padding:"10px 12px"}}>
          <div style={{fontSize:10,color:"#8B949E",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>{s.l}</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:s.c,marginTop:4}}>{s.v}</div>
        </div>)}
      </div>
    </div>

    {/* Chauffeur prestaties */}
    <div style={{background:"#161B22",border:"1px solid #21262D",borderRadius:2,padding:16}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>🚚 Chauffeur Prestaties</div>
      {chStats.length===0&&<div style={{color:"#8B949E",fontSize:13}}>Geen data voor deze periode</div>}
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:400}}>
          <thead style={{background:"#0D1117"}}>
            <tr>
              {["Chauffeur","Totaal","Afgelev.","Mislukt","Succes%","COD ontvangen"].map(h=>
                <th key={h} style={{textAlign:"left",padding:"8px 12px",fontSize:10,fontWeight:700,color:"#8B949E",textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid #21262D",whiteSpace:"nowrap"}}>{h}</th>
              )}
            </tr>
          </thead>
          <tbody>
            {chStats.map(c=><tr key={c.id}>
              <td style={{padding:"10px 12px",color:"#E6EDF3",fontWeight:500}}>{c.naam}</td>
              <td style={{padding:"10px 12px",color:"#C9D1D9"}}>{c.totaal}</td>
              <td style={{padding:"10px 12px",color:"#3FB950",fontWeight:600}}>{c.afgeleverd}</td>
              <td style={{padding:"10px 12px",color:c.mislukt>0?"#f01e2c":"#8B949E"}}>{c.mislukt}</td>
              <td style={{padding:"10px 12px"}}>
                <span style={{background:c.succes>=80?"#112D24":c.succes>=60?"#2D1D00":"#2a0408",color:c.succes>=80?"#3FB950":c.succes>=60?"#D29922":"#f01e2c",padding:"2px 8px",borderRadius:2,fontSize:11,fontWeight:700}}>{c.succes}%</span>
              </td>
              <td style={{padding:"10px 12px",color:"#D29922",fontWeight:600}}>SRD {c.cod.toFixed(2)}</td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </div>

    {/* District verdeling */}
    {distStats.length>0&&<div style={{background:"#161B22",border:"1px solid #21262D",borderRadius:2,padding:16}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>📍 Per District</div>
      {distStats.map(d=>{
        const pct=d.totaal>0?Math.round((d.afgeleverd/d.totaal)*100):0;
        return <div key={d.district} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
            <span style={{color:"#E6EDF3",fontWeight:500}}>{d.district}</span>
            <span style={{color:"#8B949E"}}>{d.afgeleverd}/{d.totaal} · {pct}%</span>
          </div>
          <div style={{height:4,background:"#21262D",borderRadius:2}}>
            <div style={{height:4,width:`${pct}%`,background:pct>=80?"#3FB950":pct>=60?"#D29922":"#f01e2c",borderRadius:2}}/>
          </div>
        </div>
      })}
    </div>}

    {/* COD per chauffeur detail */}
    {chStats.filter(c=>c.cod>0).length>0&&<div style={{background:"#161B22",border:"1px solid #21262D",borderRadius:2,padding:16}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>💵 COD Afrekening per Chauffeur</div>
      {chStats.filter(c=>c.cod>0).map(c=><div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #21262D",fontSize:13}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:2,background:"#112D24",color:"#3FB950",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>{c.naam.slice(0,2).toUpperCase()}</div>
          <span style={{fontWeight:500}}>{c.naam}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:"#3FB950",fontWeight:700,fontSize:15}}>SRD {c.cod.toFixed(2)}</span>
          <span style={{background:"#112D24",color:"#3FB950",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:2}}>ONTVANGEN</span>
        </div>
      </div>)}
    </div>}
  </div>
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const [loggedIn,setLoggedIn]=React.useState(()=>sessionStorage.getItem("sl_admin")==="1");
  if(!loggedIn)return <AdminLogin onLogin={()=>setLoggedIn(true)}/>;

  const [page,setPage]=React.useState("dashboard");
  const [zendingen,setZendingen]=React.useState([]);
  const [chauffeurs,setChauffeurs]=React.useState([]);
  const [klanten,setKlanten]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [error,setError]=React.useState("");

  async function load(){
    setLoading(true);
    try{
      const [z,c,k]=await Promise.all([
        db("/zendingen?select=*&order=aangemaakt_op.desc"),
        db("/chauffeurs?select=*&order=naam.asc"),
        db("/klanten?select=*&order=bedrijfsnaam.asc"),
      ]);
      setZendingen(z||[]);setChauffeurs(c||[]);setKlanten(k||[]);setError("");
    }catch(e){setError("Verbindingsfout: "+e.message);}
    setLoading(false);
  }

  React.useEffect(()=>{load();},[]);

  const open_dispatch=zendingen.filter(z=>!z.chauffeur_id&&!["afgeleverd","voltooid","mislukt"].includes(z.status)).length;

  const nav=[
    {id:"dashboard",icon:"▦",label:"Dashboard"},
    {id:"zendingen",icon:"↗",label:"Zendingen",badge:zendingen.filter(z=>z.status==="aangemaakt").length},
    {id:"dispatch",icon:"⊹",label:"Dispatch",badge:open_dispatch},
    {id:"chauffeurs",icon:"◉",label:"Chauffeurs"},
    {id:"klanten",icon:"◈",label:"Klanten"},
    {id:"rapportages",icon:"📊",label:"Rapportages"},
  ];

  return <div style={{fontFamily:"'DM Sans',sans-serif",background:"#0D1117",color:"#E6EDF3",minHeight:"100vh",display:"flex",flexDirection:"column"}}>

    {/* TOPBAR */}
    <div style={{background:"#111",borderBottom:"2px solid #f01e2c",padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:54,flexShrink:0,position:"sticky",top:0,zIndex:40}}>
      <div style={{display:"flex",alignItems:"center",fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:1,lineHeight:1}}>
        <span style={{color:"#E6EDF3",background:"#222",padding:"2px 7px"}}>SO</span>
        <span style={{color:"#fff",background:"#f01e2c",padding:"2px 9px"}}>LOGICS</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:7,height:7,borderRadius:"50%",background:error?"#f01e2c":"#3FB950"}}/>
        <span style={{fontSize:11,color:"#8B949E"}}>{error?"Offline":"Live"}</span>
        <button onClick={load} style={{...S.btnGhost,padding:"5px 10px",fontSize:12}}>↺</button>
        <button onClick={()=>{sessionStorage.removeItem("sl_admin");window.location.reload();}} style={{...S.btnGhost,padding:"5px 10px",fontSize:12,color:"#f01e2c",borderColor:"#f01e2c"}}>Uitloggen</button>
      </div>
    </div>

    <div style={{display:"flex",flex:1,overflow:"hidden",height:"calc(100vh - 54px)"}}>

      {/* SIDEBAR */}
      <div className="sidebar" style={{width:190,background:"#161B22",borderRight:"1px solid #21262D",padding:"12px 10px",display:"flex",flexDirection:"column",gap:2,flexShrink:0,overflowY:"auto"}}>
        <div style={{fontSize:10,fontWeight:600,color:"#484F58",letterSpacing:"0.08em",textTransform:"uppercase",padding:"10px 10px 6px"}}>Menu</div>
        {nav.map(n=><div key={n.id} onClick={()=>setPage(n.id)} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 10px",borderRadius:2,fontSize:13,cursor:"pointer",color:page===n.id?"#f01e2c":"#8B949E",background:page===n.id?"#2a0408":"transparent",borderLeft:page===n.id?"2px solid #f01e2c":"2px solid transparent",transition:"all .1s"}}>
          <span style={{fontSize:15}}>{n.icon}</span>
          <span>{n.label}</span>
          {n.badge>0&&<span style={{marginLeft:"auto",background:"#f01e2c",color:"#fff",fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:2}}>{n.badge}</span>}
        </div>)}
      </div>

      {/* MAIN */}
      <div className="main-wrap" style={{flex:1,overflowY:"auto",padding:18,display:"flex",flexDirection:"column",gap:16}}>
        {error&&<div style={{background:"#2a0408",border:"1px solid #f01e2c",borderRadius:2,padding:12,color:"#f01e2c",fontSize:13}}>{error}</div>}
        {loading
          ?<div style={{color:"#8B949E",textAlign:"center",marginTop:60,fontSize:14}}>Laden...</div>
          :<>
            {page==="dashboard"&&<Dashboard zendingen={zendingen} chauffeurs={chauffeurs} klanten={klanten}/>}
            {page==="zendingen"&&<Zendingen zendingen={zendingen} chauffeurs={chauffeurs} klanten={klanten} onRefresh={load}/>}
            {page==="dispatch"&&<Dispatch zendingen={zendingen} chauffeurs={chauffeurs} onRefresh={load}/>}
            {page==="chauffeurs"&&<Chauffeurs chauffeurs={chauffeurs} zendingen={zendingen} onRefresh={load}/>}
            {page==="klanten"&&<Klanten klanten={klanten} zendingen={zendingen} onRefresh={load}/>}
            {page==="rapportages"&&<Rapportages zendingen={zendingen} chauffeurs={chauffeurs}/>}
          </>
        }
      </div>
    </div>

    {/* MOBILE BOTTOM NAV */}
    <div className="bottom-nav" style={{display:"none",position:"fixed",bottom:0,left:0,right:0,background:"#161B22",borderTop:"2px solid #f01e2c",zIndex:50,height:62}}>
      {nav.map(n=><button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,background:"none",border:"none",color:page===n.id?"#f01e2c":"#8B949E",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,fontFamily:"'DM Sans',sans-serif",position:"relative",padding:0,minWidth:0}}>
        <span style={{fontSize:19}}>{n.icon}</span>
        <span style={{fontSize:9,fontWeight:600}}>{n.label}</span>
        {n.badge>0&&<span style={{position:"absolute",top:5,right:"calc(50% - 18px)",background:"#f01e2c",color:"#fff",fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:8,minWidth:14,textAlign:"center"}}>{n.badge}</span>}
      </button>)}
    </div>

  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
