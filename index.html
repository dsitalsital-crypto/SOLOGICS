<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOlogics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0D1117;font-family:'DM Sans',sans-serif;color:#E6EDF3}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#0D1117}
  ::-webkit-scrollbar-thumb{background:#21262D;border-radius:2px}
  input,select,textarea{font-family:'DM Sans',sans-serif;color:#E6EDF3}
  input::placeholder,textarea::placeholder{color:#484F58}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SUPABASE_URL = "https://bvnyzxusfiloaivvhlnn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2bnl6eHVzZmlsb2FpdnZobG5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjAzMjcsImV4cCI6MjA5MzIzNjMyN30.uT4KjSUxK9rwINGRktVcUgu3vdwvuoQ3lEFfccfJTQY";

const hdrs = {
  "Content-Type":"application/json",
  apikey: SUPABASE_KEY,
  Authorization:`Bearer ${SUPABASE_KEY}`
};

async function db(path, opts={}) {
  const r = await fetch(SUPABASE_URL+"/rest/v1"+path,{headers:{...hdrs,...(opts.headers||{})}, ...opts});
  if(!r.ok) throw new Error(await r.text());
  if(r.status===204) return null;
  return r.json();
}

const fmtDate = d => d ? new Date(d).toLocaleDateString("nl-NL",{day:"2-digit",month:"short",year:"numeric"}) : "—";

const STATUS = {
  in_behandeling:{label:"In behandeling",color:"#D29922",bg:"#2D1D00"},
  onderweg:      {label:"Onderweg",       color:"#58A6FF",bg:"#1A3A5C"},
  afgeleverd:    {label:"Afgeleverd",     color:"#3FB950",bg:"#112D24"},
  vertraging:    {label:"Vertraging",     color:"#f01e2c",bg:"#2a0408"},
  geannuleerd:   {label:"Geannuleerd",    color:"#8B949E",bg:"#21262D"},
};

const S = {
  topbar:{background:"#111",borderBottom:"2px solid #f01e2c",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:58,flexShrink:0},
  sidebar:{width:200,background:"#161B22",borderRight:"1px solid #21262D",padding:"16px 12px",display:"flex",flexDirection:"column",gap:4,flexShrink:0,overflowY:"auto"},
  main:{flex:1,overflowY:"auto",padding:24,display:"flex",flexDirection:"column",gap:20},
  card:{background:"#161B22",border:"1px solid #21262D",borderRadius:2,padding:16},
  statCard:{background:"#161B22",border:"1px solid #21262D",borderTop:"2px solid #f01e2c",borderRadius:2,padding:16},
  tableWrap:{background:"#161B22",border:"1px solid #21262D",borderRadius:2,overflow:"hidden"},
  btn:{background:"#f01e2c",color:"#fff",border:"none",borderRadius:2,padding:"8px 16px",fontSize:13,fontWeight:500,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6,fontFamily:"'DM Sans',sans-serif"},
  btnGhost:{background:"transparent",color:"#8B949E",border:"1px solid #30363D",borderRadius:2,padding:"6px 12px",fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},
  input:{background:"#0D1117",border:"1px solid #30363D",borderRadius:2,color:"#E6EDF3",padding:"8px 10px",fontSize:13,width:"100%",outline:"none"},
  select:{background:"#0D1117",border:"1px solid #30363D",borderRadius:2,color:"#E6EDF3",padding:"8px 10px",fontSize:13,width:"100%",outline:"none"},
  label:{fontSize:11,color:"#8B949E",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600,marginBottom:4,display:"block"},
  pageTitle:{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:"#E6EDF3",letterSpacing:1},
  th:{textAlign:"left",padding:"10px 16px",fontSize:11,fontWeight:600,color:"#8B949E",textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid #21262D"},
  td:{padding:"12px 16px",borderBottom:"1px solid #1c2128",color:"#C9D1D9",verticalAlign:"middle"},
};

function NavItem({icon,label,active,badge,onClick}){
  return <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:2,fontSize:13,cursor:"pointer",color:active?"#f01e2c":"#8B949E",background:active?"#2a0408":"transparent",borderLeft:active?"2px solid #f01e2c":"2px solid transparent"}}>
    <span style={{fontSize:15}}>{icon}</span>
    <span>{label}</span>
    {badge>0&&<span style={{marginLeft:"auto",background:"#f01e2c",color:"#fff",fontSize:10,fontWeight:600,padding:"1px 6px",borderRadius:2}}>{badge}</span>}
  </div>
}

function Badge({status}){
  const m=STATUS[status]||STATUS.in_behandeling;
  return <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 8px",borderRadius:2,fontSize:11,fontWeight:600,background:m.bg,color:m.color}}>
    <span style={{width:6,height:6,borderRadius:"50%",background:m.color,display:"inline-block"}}/>
    {m.label}
  </span>
}

function Modal({title,onClose,children}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
    <div style={{background:"#161B22",border:"1px solid #21262D",borderRadius:2,padding:24,width:520,maxHeight:"90vh",overflowY:"auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div style={S.pageTitle}>{title}</div>
        <button onClick={onClose} style={S.btnGhost}>✕ Sluiten</button>
      </div>
      {children}
    </div>
  </div>
}

function Field({label,children}){
  return <div style={{marginBottom:14}}>
    <label style={S.label}>{label}</label>
    {children}
  </div>
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({orders,klanten}){
  const actief=orders.filter(o=>o.status!=="afgeleverd"&&o.status!=="geannuleerd").length;
  const onderweg=orders.filter(o=>o.status==="onderweg").length;
  const vandaag=orders.filter(o=>{const d=new Date(o.aangemaakt_op),n=new Date();return d.toDateString()===n.toDateString()&&o.status==="afgeleverd";}).length;
  const vertraging=orders.filter(o=>o.status==="vertraging").length;
  const recent=[...orders].sort((a,b)=>new Date(b.aangemaakt_op)-new Date(a.aangemaakt_op)).slice(0,6);

  return <div style={{display:"flex",flexDirection:"column",gap:20}}>
    <div>
      <div style={S.pageTitle}>Dashboard</div>
      <div style={{fontSize:13,color:"#8B949E",marginTop:2}}>{new Date().toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
      {[
        {label:"Actieve orders",value:actief,color:"#E6EDF3"},
        {label:"Onderweg",value:onderweg,color:"#58A6FF"},
        {label:"Afgeleverd vandaag",value:vandaag,color:"#3FB950"},
        {label:"Vertraging",value:vertraging,color:vertraging>0?"#f01e2c":"#E6EDF3"},
      ].map(s=><div key={s.label} style={S.statCard}>
        <div style={{fontSize:11,color:"#8B949E",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.06em"}}>{s.label}</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:40,color:s.color,marginTop:4,lineHeight:1}}>{s.value}</div>
      </div>)}
    </div>

    <div>
      <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>Recente orders</div>
      <div style={S.tableWrap}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead style={{background:"#0D1117"}}>
            <tr>{["Order #","Klant","Bestemming","Datum","Status"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
          </thead>
          <tbody>
            {recent.length===0&&<tr><td colSpan={5} style={{...S.td,color:"#8B949E",textAlign:"center",padding:32}}>Nog geen orders — maak je eerste order aan via de Orders pagina</td></tr>}
            {recent.map(o=>{
              const k=klanten.find(k=>k.id===o.klant_id);
              return <tr key={o.id}>
                <td style={{...S.td,color:"#f01e2c",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,fontWeight:600}}>#{o.order_nummer}</td>
                <td style={S.td}>{k?.bedrijfsnaam||"—"}</td>
                <td style={S.td}>{o.bestemming}</td>
                <td style={{...S.td,color:"#8B949E"}}>{fmtDate(o.aangemaakt_op)}</td>
                <td style={S.td}><Badge status={o.status}/></td>
              </tr>
            })}
          </tbody>
        </table>
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
      <div style={S.card}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>Top klanten</div>
        {klanten.length===0&&<div style={{color:"#8B949E",fontSize:13}}>Nog geen klanten</div>}
        {klanten.slice(0,5).map(k=>{
          const cnt=orders.filter(o=>o.klant_id===k.id).length;
          return <div key={k.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #21262D",fontSize:13}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:30,height:30,borderRadius:2,background:"#2a0408",color:"#f01e2c",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>
                {k.bedrijfsnaam.slice(0,2).toUpperCase()}
              </div>
              <div>
                <div style={{fontWeight:500,color:"#E6EDF3"}}>{k.bedrijfsnaam}</div>
                <div style={{fontSize:11,color:"#8B949E"}}>{cnt} orders</div>
              </div>
            </div>
          </div>
        })}
      </div>
      <div style={S.card}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>Status verdeling</div>
        {Object.entries(STATUS).map(([key,meta])=>{
          const cnt=orders.filter(o=>o.status===key).length;
          const pct=orders.length>0?Math.round((cnt/orders.length)*100):0;
          return <div key={key} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
              <span style={{color:meta.color}}>{meta.label}</span>
              <span style={{color:"#8B949E"}}>{cnt}</span>
            </div>
            <div style={{height:4,background:"#21262D",borderRadius:2}}>
              <div style={{height:4,width:`${pct}%`,background:meta.color,borderRadius:2}}/>
            </div>
          </div>
        })}
      </div>
    </div>
  </div>
}

// ── ORDERS ───────────────────────────────────────────────────────────────────
function Orders({orders,klanten,onRefresh}){
  const [filter,setFilter]=React.useState("alle");
  const [search,setSearch]=React.useState("");
  const [showModal,setShowModal]=React.useState(false);
  const [detail,setDetail]=React.useState(null);
  const [form,setForm]=React.useState({klant_id:"",bestemming:"",omschrijving:"",gewicht_kg:"",aantal_colli:"",leverdatum:"",notities:"",status:"in_behandeling"});
  const [saving,setSaving]=React.useState(false);
  const [err,setErr]=React.useState("");

  const filtered=orders.filter(o=>{
    const k=klanten.find(k=>k.id===o.klant_id);
    const mf=filter==="alle"||o.status===filter;
    const ms=!search||o.bestemming?.toLowerCase().includes(search.toLowerCase())||k?.bedrijfsnaam?.toLowerCase().includes(search.toLowerCase())||String(o.order_nummer).includes(search);
    return mf&&ms;
  });

  async function saveOrder(){
    if(!form.bestemming){setErr("Bestemming is verplicht");return;}
    setSaving(true);setErr("");
    try{
      await db("/orders",{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify({...form,gewicht_kg:form.gewicht_kg||null,aantal_colli:form.aantal_colli||null,leverdatum:form.leverdatum||null})});
      setShowModal(false);
      setForm({klant_id:"",bestemming:"",omschrijving:"",gewicht_kg:"",aantal_colli:"",leverdatum:"",notities:"",status:"in_behandeling"});
      onRefresh();
    }catch(e){setErr(e.message);}
    setSaving(false);
  }

  async function updateStatus(id,status){
    await db(`/orders?id=eq.${id}`,{method:"PATCH",headers:{Prefer:"return=minimal"},body:JSON.stringify({status})});
    onRefresh();
    if(detail?.id===id)setDetail(d=>({...d,status}));
  }

  async function deleteOrder(id){
    if(!confirm("Order verwijderen?"))return;
    await db(`/orders?id=eq.${id}`,{method:"DELETE"});
    onRefresh();setDetail(null);
  }

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={S.pageTitle}>Orders</div>
      <button style={S.btn} onClick={()=>setShowModal(true)}>+ Nieuwe order</button>
    </div>

    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
      <input style={{...S.input,maxWidth:260}} placeholder="Zoeken op klant, bestemming, order#..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <div style={{display:"flex",gap:3,background:"#0D1117",padding:3,borderRadius:2,flexWrap:"wrap"}}>
        {["alle",...Object.keys(STATUS)].map(s=><button key={s} onClick={()=>setFilter(s)} style={{padding:"5px 10px",borderRadius:2,fontSize:11,cursor:"pointer",border:"none",fontFamily:"'DM Sans',sans-serif",background:filter===s?"#161B22":"transparent",color:filter===s?"#f01e2c":"#8B949E",fontWeight:filter===s?600:400}}>
          {s==="alle"?"Alle":STATUS[s].label}
        </button>)}
      </div>
    </div>

    <div style={S.tableWrap}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead style={{background:"#0D1117"}}>
          <tr>{["Order #","Klant","Bestemming","Leverdatum","Gewicht","Status",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
        </thead>
        <tbody>
          {filtered.length===0&&<tr><td colSpan={7} style={{...S.td,color:"#8B949E",textAlign:"center",padding:32}}>Geen orders gevonden</td></tr>}
          {filtered.map(o=>{
            const k=klanten.find(k=>k.id===o.klant_id);
            return <tr key={o.id} style={{cursor:"pointer"}} onClick={()=>setDetail(o)}>
              <td style={{...S.td,color:"#f01e2c",fontFamily:"'Bebas Neue',sans-serif",fontSize:16}}>#{o.order_nummer}</td>
              <td style={S.td}>{k?.bedrijfsnaam||"—"}</td>
              <td style={S.td}>{o.bestemming}</td>
              <td style={{...S.td,color:"#8B949E"}}>{fmtDate(o.leverdatum)}</td>
              <td style={{...S.td,color:"#8B949E"}}>{o.gewicht_kg?`${o.gewicht_kg} kg`:"—"}</td>
              <td style={S.td}><Badge status={o.status}/></td>
              <td style={S.td} onClick={e=>e.stopPropagation()}>
                <button style={S.btnGhost} onClick={()=>deleteOrder(o.id)}>✕</button>
              </td>
            </tr>
          })}
        </tbody>
      </table>
    </div>

    {showModal&&<Modal title="Nieuwe order" onClose={()=>setShowModal(false)}>
      <Field label="Klant">
        <select style={S.select} value={form.klant_id} onChange={e=>setForm(f=>({...f,klant_id:e.target.value}))}>
          <option value="">Selecteer klant...</option>
          {klanten.map(k=><option key={k.id} value={k.id}>{k.bedrijfsnaam}</option>)}
        </select>
      </Field>
      <Field label="Bestemming *"><input style={S.input} value={form.bestemming} onChange={e=>setForm(f=>({...f,bestemming:e.target.value}))} placeholder="Stad of adres"/></Field>
      <Field label="Omschrijving"><input style={S.input} value={form.omschrijving} onChange={e=>setForm(f=>({...f,omschrijving:e.target.value}))} placeholder="Wat wordt er vervoerd?"/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Field label="Gewicht (kg)"><input style={S.input} type="number" value={form.gewicht_kg} onChange={e=>setForm(f=>({...f,gewicht_kg:e.target.value}))}/></Field>
        <Field label="Aantal colli"><input style={S.input} type="number" value={form.aantal_colli} onChange={e=>setForm(f=>({...f,aantal_colli:e.target.value}))}/></Field>
      </div>
      <Field label="Leverdatum"><input style={S.input} type="date" value={form.leverdatum} onChange={e=>setForm(f=>({...f,leverdatum:e.target.value}))}/></Field>
      <Field label="Status">
        <select style={S.select} value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
          {Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
        </select>
      </Field>
      <Field label="Notities"><textarea style={{...S.input,height:80,resize:"vertical"}} value={form.notities} onChange={e=>setForm(f=>({...f,notities:e.target.value}))}/></Field>
      {err&&<div style={{color:"#f01e2c",fontSize:12,marginBottom:12}}>{err}</div>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button style={S.btnGhost} onClick={()=>setShowModal(false)}>Annuleren</button>
        <button style={S.btn} onClick={saveOrder} disabled={saving}>{saving?"Opslaan...":"Order aanmaken"}</button>
      </div>
    </Modal>}

    {detail&&<Modal title={`Order #${detail.order_nummer}`} onClose={()=>setDetail(null)}>
      {[
        ["Klant",klanten.find(k=>k.id===detail.klant_id)?.bedrijfsnaam||"—"],
        ["Bestemming",detail.bestemming],
        ["Omschrijving",detail.omschrijving||"—"],
        ["Gewicht",detail.gewicht_kg?`${detail.gewicht_kg} kg`:"—"],
        ["Aantal colli",detail.aantal_colli||"—"],
        ["Leverdatum",fmtDate(detail.leverdatum)],
        ["Aangemaakt op",fmtDate(detail.aangemaakt_op)],
        ["Notities",detail.notities||"—"],
      ].map(([k,v])=><div key={k} style={{display:"flex",padding:"9px 0",borderBottom:"1px solid #21262D",fontSize:13}}>
        <span style={{color:"#8B949E",width:140,flexShrink:0}}>{k}</span>
        <span style={{color:"#E6EDF3"}}>{v}</span>
      </div>)}
      <div style={{marginTop:16}}>
        <label style={S.label}>Status wijzigen</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:6}}>
          {Object.entries(STATUS).map(([key,meta])=><button key={key} onClick={()=>updateStatus(detail.id,key)} style={{padding:"6px 14px",borderRadius:2,fontSize:12,cursor:"pointer",border:`1px solid ${detail.status===key?meta.color:"#30363D"}`,background:detail.status===key?meta.bg:"transparent",color:detail.status===key?meta.color:"#8B949E",fontFamily:"'DM Sans',sans-serif"}}>
            {meta.label}
          </button>)}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:20}}>
        <button style={{...S.btnGhost,color:"#f01e2c",borderColor:"#f01e2c"}} onClick={()=>deleteOrder(detail.id)}>Order verwijderen</button>
      </div>
    </Modal>}
  </div>
}

// ── KLANTEN ──────────────────────────────────────────────────────────────────
function Klanten({klanten,orders,onRefresh}){
  const [showModal,setShowModal]=React.useState(false);
  const [form,setForm]=React.useState({bedrijfsnaam:"",contactpersoon:"",email:"",telefoon:"",adres:"",stad:"",postcode:""});
  const [saving,setSaving]=React.useState(false);
  const [err,setErr]=React.useState("");
  const [search,setSearch]=React.useState("");

  const filtered=klanten.filter(k=>!search||k.bedrijfsnaam.toLowerCase().includes(search.toLowerCase())||k.stad?.toLowerCase().includes(search.toLowerCase()));

  async function saveKlant(){
    if(!form.bedrijfsnaam){setErr("Bedrijfsnaam is verplicht");return;}
    setSaving(true);setErr("");
    try{
      await db("/klanten",{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify(form)});
      setShowModal(false);
      setForm({bedrijfsnaam:"",contactpersoon:"",email:"",telefoon:"",adres:"",stad:"",postcode:""});
      onRefresh();
    }catch(e){setErr(e.message);}
    setSaving(false);
  }

  async function deleteKlant(id){
    if(!confirm("Klant verwijderen?"))return;
    await db(`/klanten?id=eq.${id}`,{method:"DELETE"});
    onRefresh();
  }

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={S.pageTitle}>Klanten</div>
      <button style={S.btn} onClick={()=>setShowModal(true)}>+ Nieuwe klant</button>
    </div>
    <input style={{...S.input,maxWidth:300}} placeholder="Zoeken op naam of stad..." value={search} onChange={e=>setSearch(e.target.value)}/>
    <div style={S.tableWrap}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead style={{background:"#0D1117"}}>
          <tr>{["Bedrijf","Contactpersoon","Email","Telefoon","Stad","Orders",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
        </thead>
        <tbody>
          {filtered.length===0&&<tr><td colSpan={7} style={{...S.td,color:"#8B949E",textAlign:"center",padding:32}}>Geen klanten gevonden</td></tr>}
          {filtered.map(k=>{
            const cnt=orders.filter(o=>o.klant_id===k.id).length;
            return <tr key={k.id}>
              <td style={S.td}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:28,height:28,borderRadius:2,background:"#2a0408",color:"#f01e2c",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>
                    {k.bedrijfsnaam.slice(0,2).toUpperCase()}
                  </div>
                  <span style={{color:"#E6EDF3",fontWeight:500}}>{k.bedrijfsnaam}</span>
                </div>
              </td>
              <td style={S.td}>{k.contactpersoon||"—"}</td>
              <td style={{...S.td,color:"#8B949E"}}>{k.email||"—"}</td>
              <td style={{...S.td,color:"#8B949E"}}>{k.telefoon||"—"}</td>
              <td style={{...S.td,color:"#8B949E"}}>{k.stad||"—"}</td>
              <td style={S.td}><span style={{background:"#2a0408",color:"#f01e2c",padding:"2px 8px",borderRadius:2,fontSize:12,fontWeight:600}}>{cnt}</span></td>
              <td style={S.td}><button style={S.btnGhost} onClick={()=>deleteKlant(k.id)}>✕</button></td>
            </tr>
          })}
        </tbody>
      </table>
    </div>

    {showModal&&<Modal title="Nieuwe klant" onClose={()=>setShowModal(false)}>
      <Field label="Bedrijfsnaam *"><input style={S.input} value={form.bedrijfsnaam} onChange={e=>setForm(f=>({...f,bedrijfsnaam:e.target.value}))}/></Field>
      <Field label="Contactpersoon"><input style={S.input} value={form.contactpersoon} onChange={e=>setForm(f=>({...f,contactpersoon:e.target.value}))}/></Field>
      <Field label="Email"><input style={S.input} type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></Field>
      <Field label="Telefoon"><input style={S.input} value={form.telefoon} onChange={e=>setForm(f=>({...f,telefoon:e.target.value}))}/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Field label="Stad"><input style={S.input} value={form.stad} onChange={e=>setForm(f=>({...f,stad:e.target.value}))}/></Field>
        <Field label="Postcode"><input style={S.input} value={form.postcode} onChange={e=>setForm(f=>({...f,postcode:e.target.value}))}/></Field>
      </div>
      <Field label="Adres"><input style={S.input} value={form.adres} onChange={e=>setForm(f=>({...f,adres:e.target.value}))}/></Field>
      {err&&<div style={{color:"#f01e2c",fontSize:12,marginBottom:12}}>{err}</div>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button style={S.btnGhost} onClick={()=>setShowModal(false)}>Annuleren</button>
        <button style={S.btn} onClick={saveKlant} disabled={saving}>{saving?"Opslaan...":"Klant aanmaken"}</button>
      </div>
    </Modal>}
  </div>
}

// ── ROOT ─────────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=React.useState("dashboard");
  const [orders,setOrders]=React.useState([]);
  const [klanten,setKlanten]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [error,setError]=React.useState("");

  async function fetchData(){
    setLoading(true);
    try{
      const [o,k]=await Promise.all([
        db("/orders?select=*&order=aangemaakt_op.desc"),
        db("/klanten?select=*&order=bedrijfsnaam.asc"),
      ]);
      setOrders(o||[]);setKlanten(k||[]);setError("");
    }catch(e){setError("Kan geen verbinding maken: "+e.message);}
    setLoading(false);
  }

  React.useEffect(()=>{fetchData();},[]);

  const pending=orders.filter(o=>o.status==="in_behandeling").length;

  return <div style={{fontFamily:"'DM Sans',sans-serif",background:"#0D1117",color:"#E6EDF3",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
    {/* TOPBAR */}
    <div style={S.topbar}>
      <div style={{display:"flex",alignItems:"center",fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:1,lineHeight:1}}>
        <span style={{color:"#E6EDF3",background:"#222",padding:"3px 8px"}}>SO</span>
        <span style={{color:"#fff",background:"#f01e2c",padding:"3px 10px"}}>LOGICS</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:error?"#f01e2c":"#3FB950"}}/>
          <span style={{fontSize:11,color:"#8B949E"}}>{error?"Offline":"Verbonden"}</span>
        </div>
        <button onClick={fetchData} style={{...S.btnGhost,fontSize:11}}>↺ Vernieuwen</button>
        <div style={{width:32,height:32,background:"#222",borderRadius:2,border:"1px solid #333",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:"#aaa"}}>MT</div>
      </div>
    </div>

    {/* BODY */}
    <div style={{display:"flex",flex:1,overflow:"hidden",height:"calc(100vh - 58px)"}}>
      {/* SIDEBAR */}
      <div style={S.sidebar}>
        <div style={{fontSize:10,fontWeight:600,color:"#484F58",letterSpacing:"0.08em",textTransform:"uppercase",padding:"12px 10px 4px"}}>Menu</div>
        <NavItem icon="▦" label="Dashboard" active={page==="dashboard"} onClick={()=>setPage("dashboard")}/>
        <NavItem icon="↗" label="Orders" active={page==="orders"} badge={pending} onClick={()=>setPage("orders")}/>
        <NavItem icon="◈" label="Klanten" active={page==="klanten"} onClick={()=>setPage("klanten")}/>
      </div>

      {/* MAIN */}
      <div style={S.main}>
        {error&&<div style={{background:"#2a0408",border:"1px solid #f01e2c",borderRadius:2,padding:16,color:"#f01e2c",fontSize:13}}>{error}</div>}
        {loading
          ?<div style={{color:"#8B949E",textAlign:"center",marginTop:80,fontSize:14}}>Gegevens laden...</div>
          :<>
            {page==="dashboard"&&<Dashboard orders={orders} klanten={klanten}/>}
            {page==="orders"&&<Orders orders={orders} klanten={klanten} onRefresh={fetchData}/>}
            {page==="klanten"&&<Klanten klanten={klanten} orders={orders} onRefresh={fetchData}/>}
          </>
        }
      </div>
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
